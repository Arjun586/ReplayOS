<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReplayOS</title>

    <script>
      (function() {
        try {
          
          var storedTheme = localStorage.getItem('app-theme'); 
          
          if (storedTheme) {
            var themeName = storedTheme.replace(/"/g, ''); 
            document.documentElement.setAttribute('data-theme', themeName);
          } else {
            // Fallback default theme
            document.documentElement.setAttribute('data-theme', 'purple');
          }
        } catch (e) {
          console.error("Theme script failed", e);
        }
      })();
    </script>
    </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
